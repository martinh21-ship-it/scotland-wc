<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0a1540">
<title>Scotland Tracker — Score Admin</title>
<style>
  :root{
    --navy:#10205a; --navy-deep:#0a1540; --gold:#f5c518; --gold-soft:#ffd84d;
    --good:#4ecb86; --bad:#f07a52; --line:rgba(255,255,255,.14);
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--navy-deep);min-height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--navy-deep);color:#eaf0f8;line-height:1.5;padding:18px 14px 110px;max-width:680px;margin:0 auto}
  h1{font-size:22px;font-weight:700;margin-bottom:4px}
  h1 span{color:var(--gold-soft)}
  .sub{color:#9fb0d6;font-size:13px;margin-bottom:16px}

  .setup{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
  .setup h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:10px;font-family:var(--mono)}
  .setup label{display:block;font-size:12px;color:#9fb0d6;margin:8px 0 3px}
  .setup input{width:100%;padding:9px 11px;background:#0a1540;border:1px solid var(--line);border-radius:8px;
    color:#eaf0f8;font-family:var(--mono);font-size:13px}
  .setup input:focus{outline:none;border-color:var(--gold)}
  .setup .row{display:flex;gap:8px}
  .setup .row > div{flex:1}
  .save-token{margin-top:10px;display:flex;gap:8px;align-items:center}
  .save-token button{font-size:12px;padding:7px 12px;border-radius:8px;border:1px solid var(--line);
    background:rgba(255,255,255,.06);color:#dfe8f5;cursor:pointer}
  .tokstatus{font-size:12px;font-family:var(--mono)}
  .tokstatus.ok{color:var(--good)} .tokstatus.no{color:#9fb0d6}

  details.g{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  details.g > summary{list-style:none;cursor:pointer;padding:12px 14px;font-weight:600;
    display:flex;align-items:center;gap:9px;user-select:none;background:rgba(255,255,255,.04)}
  details.g > summary::-webkit-details-marker{display:none}
  .tag{font-family:var(--mono);font-size:12px;color:var(--gold);border:1px solid var(--line);border-radius:6px;padding:1px 7px}
  .cnt{margin-left:auto;font-family:var(--mono);font-size:11px;color:#9fb0d6}
  .chev{color:#9fb0d6;transition:transform .2s}
  details.g[open] .chev{transform:rotate(90deg)}
  .body{padding:6px 12px 12px}
  .m{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:8px 4px;border-top:1px solid rgba(255,255,255,.06)}
  .m:first-child{border-top:none}
  .h{text-align:right;font-size:14px;font-weight:600}
  .a{text-align:left;font-size:14px;font-weight:600}
  .sc{display:flex;align-items:center;gap:5px}
  .sc input{width:40px;height:38px;text-align:center;font-family:var(--mono);font-size:17px;font-weight:700;
    background:#0a1540;border:1.5px solid rgba(245,197,24,.4);border-radius:8px;color:var(--gold-soft);-moz-appearance:textfield}
  .sc input::-webkit-outer-spin-button,.sc input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .sc input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,24,.3)}
  .dash{font-family:var(--mono);color:var(--gold);font-size:13px}
  .stbtns{display:flex;gap:4px;margin-left:6px}
  .stbtns button{font-size:10px;font-family:var(--mono);padding:3px 6px;border-radius:6px;border:1px solid var(--line);
    background:rgba(255,255,255,.05);color:#cdd9ea;cursor:pointer}
  .stbtns button.on{background:var(--good);border-color:var(--good);color:#04230f;font-weight:700}
  .stbtns button.onlive{background:var(--bad);border-color:var(--bad);color:#2a0a04;font-weight:700}
  .flag{font-size:14px}

  .bar{position:fixed;left:0;right:0;bottom:0;background:#0a1540;border-top:1px solid var(--line);
    padding:12px 14px;max-width:680px;margin:0 auto}
  .bar .btns{display:flex;gap:10px;align-items:center}
  .bar button{flex:1;font-size:15px;font-weight:700;padding:13px;border-radius:10px;border:none;background:var(--gold);color:#10205a;cursor:pointer}
  .bar button:disabled{opacity:.5}
  .bar button.sec{flex:0 0 auto;background:rgba(255,255,255,.1);color:#eaf0f8}
  .status{font-size:13px;margin-top:8px;min-height:1.3em;text-align:center;font-family:var(--mono)}
  .status.ok{color:var(--good)} .status.err{color:var(--bad)} .status.busy{color:var(--gold-soft)}
  code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px}
  a{color:var(--gold-soft)}
</style>
</head>
<body>
  <h1>Score Admin <span>· Scotland Tracker</span></h1>
  <p class="sub">Enter scores and tap <b>Save to GitHub</b>. The tracker updates automatically — no copy-paste.</p>

  <div class="setup">
    <h2>GitHub connection</h2>
    <div class="row">
      <div><label>Your GitHub username</label><input id="owner" placeholder="e.g. martinh" autocapitalize="off" autocorrect="off"></div>
      <div><label>Repo name</label><input id="repo" placeholder="scotland-wc" autocapitalize="off" autocorrect="off"></div>
    </div>
    <label>Personal access token (stored only on this device)</label>
    <input id="token" type="password" placeholder="ghp_..." autocapitalize="off" autocorrect="off">
    <div class="save-token">
      <button id="saveTok">Remember on this device</button>
      <span class="tokstatus no" id="tokStatus">Not saved</span>
    </div>
  </div>

  <div id="groups"></div>

  <div class="bar">
    <div class="btns">
      <button class="sec" id="reloadBtn">Reload</button>
      <button id="saveBtn">Save to GitHub</button>
    </div>
    <div class="status" id="status"></div>
  </div>

<script>
const TEAMS = {
  MEX:{n:"Mexico",iso:"MX"}, KOR:{n:"South Korea",iso:"KR"}, RSA:{n:"South Africa",iso:"ZA"}, CZE:{n:"Czechia",iso:"CZ"},
  CAN:{n:"Canada",iso:"CA"}, BIH:{n:"Bosnia & Herz.",iso:"BA"}, QAT:{n:"Qatar",iso:"QA"}, SUI:{n:"Switzerland",iso:"CH"},
  SCO:{n:"Scotland",iso:"@SCO"}, BRA:{n:"Brazil",iso:"BR"}, MAR:{n:"Morocco",iso:"MA"}, HAI:{n:"Haiti",iso:"HT"},
  USA:{n:"United States",iso:"US"}, AUS:{n:"Australia",iso:"AU"}, TUR:{n:"Turkey",iso:"TR"}, PAR:{n:"Paraguay",iso:"PY"},
  GER:{n:"Germany",iso:"DE"}, CIV:{n:"Ivory Coast",iso:"CI"}, ECU:{n:"Ecuador",iso:"EC"}, CUR:{n:"Curacao",iso:"CW"},
  SWE:{n:"Sweden",iso:"SE"}, NED:{n:"Netherlands",iso:"NL"}, JPN:{n:"Japan",iso:"JP"}, TUN:{n:"Tunisia",iso:"TN"},
  BEL:{n:"Belgium",iso:"BE"}, IRN:{n:"Iran",iso:"IR"}, EGY:{n:"Egypt",iso:"EG"}, NZL:{n:"New Zealand",iso:"NZ"},
  ESP:{n:"Spain",iso:"ES"}, URU:{n:"Uruguay",iso:"UY"}, KSA:{n:"Saudi Arabia",iso:"SA"}, CPV:{n:"Cape Verde",iso:"CV"},
  FRA:{n:"France",iso:"FR"}, SEN:{n:"Senegal",iso:"SN"}, NOR:{n:"Norway",iso:"NO"}, IRQ:{n:"Iraq",iso:"IQ"},
  ARG:{n:"Argentina",iso:"AR"}, AUT:{n:"Austria",iso:"AT"}, ALG:{n:"Algeria",iso:"DZ"}, JOR:{n:"Jordan",iso:"JO"},
  POR:{n:"Portugal",iso:"PT"}, COL:{n:"Colombia",iso:"CO"}, UZB:{n:"Uzbekistan",iso:"UZ"}, COD:{n:"DR Congo",iso:"CD"},
  ENG:{n:"England",iso:"@ENG"}, CRO:{n:"Croatia",iso:"HR"}, PAN:{n:"Panama",iso:"PA"}, GHA:{n:"Ghana",iso:"GH"}
};

const ALLFIX = [
  ["A","MEX","RSA"],["A","KOR","CZE"],["A","MEX","KOR"],["A","CZE","RSA"],["A","CZE","MEX"],["A","RSA","KOR"],
  ["B","QAT","SUI"],["B","CAN","BIH"],["B","CAN","QAT"],["B","SUI","BIH"],["B","SUI","CAN"],["B","BIH","QAT"],
  ["C","HAI","SCO"],["C","BRA","MAR"],["C","SCO","MAR"],["C","BRA","HAI"],["C","MAR","HAI"],["C","SCO","BRA"],
  ["D","USA","PAR"],["D","AUS","TUR"],["D","USA","AUS"],["D","TUR","PAR"],["D","TUR","USA"],["D","PAR","AUS"],
  ["E","GER","CUR"],["E","CIV","ECU"],["E","GER","CIV"],["E","ECU","CUR"],["E","ECU","GER"],["E","CUR","CIV"],
  ["F","SWE","TUN"],["F","NED","JPN"],["F","NED","SWE"],["F","TUN","JPN"],["F","JPN","SWE"],["F","TUN","NED"],
  ["G","BEL","EGY"],["G","IRN","NZL"],["G","BEL","IRN"],["G","NZL","EGY"],["G","NZL","BEL"],["G","EGY","IRN"],
  ["H","ESP","CPV"],["H","KSA","URU"],["H","ESP","KSA"],["H","URU","CPV"],["H","CPV","KSA"],["H","URU","ESP"],
  ["I","FRA","SEN"],["I","IRQ","NOR"],["I","FRA","IRQ"],["I","NOR","SEN"],["I","SEN","IRQ"],["I","NOR","FRA"],
  ["J","ARG","ALG"],["J","AUT","JOR"],["J","ARG","AUT"],["J","JOR","ALG"],["J","JOR","ARG"],["J","ALG","AUT"],
  ["K","UZB","COL"],["K","POR","COD"],["K","POR","UZB"],["K","COL","COD"],["K","COL","POR"],["K","COD","UZB"],
  ["L","GHA","PAN"],["L","ENG","CRO"],["L","ENG","GHA"],["L","PAN","CRO"],["L","PAN","ENG"],["L","CRO","GHA"]
];

const state = {};
function key(g,h,a){return g+"|"+h+"|"+a;}
const $=s=>document.querySelector(s);

function flag(code){
  const iso=TEAMS[code]?TEAMS[code].iso:"";
  if(iso==="@SCO") return '<svg width="18" height="11" viewBox="0 0 20 12" style="vertical-align:-1px"><rect width="20" height="12" fill="#005eb8"/><path d="M0 0 L20 12 M20 0 L0 12" stroke="#fff" stroke-width="2.2"/></svg>';
  if(iso==="@ENG") return '<svg width="18" height="11" viewBox="0 0 20 12" style="vertical-align:-1px"><rect width="20" height="12" fill="#fff"/><path d="M10 0 V12 M0 6 H20" stroke="#ce1124" stroke-width="2.4"/></svg>';
  if(iso&&iso.length===2){const A=0x1F1E6,a="A".charCodeAt(0);return '<span class="flag">'+String.fromCodePoint(A+iso.charCodeAt(0)-a,A+iso.charCodeAt(1)-a)+'</span>';}
  return "";
}

function loadCreds(){
  try{
    const o=JSON.parse(localStorage.getItem("scoTrackerCreds")||"{}");
    if(o.owner) $("#owner").value=o.owner;
    if(o.repo) $("#repo").value=o.repo;
    if(o.token){ $("#token").value=o.token; setTok(true); }
  }catch(e){}
}
function saveCreds(){
  try{
    localStorage.setItem("scoTrackerCreds",JSON.stringify({
      owner:$("#owner").value.trim(), repo:$("#repo").value.trim(), token:$("#token").value.trim()
    }));
    setTok(true);
  }catch(e){ setTok(false); }
}
function setTok(ok){
  const s=$("#tokStatus");
  if(ok){ s.textContent="Saved on this device"; s.className="tokstatus ok"; }
  else { s.textContent="Not saved"; s.className="tokstatus no"; }
}

function ghBase(){
  const o=$("#owner").value.trim(), r=$("#repo").value.trim();
  return "https://api.github.com/repos/"+o+"/"+r+"/contents/results.json";
}
async function ghLoad(){
  const tok=$("#token").value.trim();
  // cache-bust + no-store so we always get the CURRENT sha, never a cached one
  const res=await fetch(ghBase()+"?ref=main&t="+Date.now(),
    {cache:"no-store",headers:{Authorization:"token "+tok,Accept:"application/vnd.github+json"}});
  if(res.status===404) return {sha:null,json:null};
  if(!res.ok) throw new Error("Load failed: HTTP "+res.status+(res.status===401?" (bad token)":res.status===404?" (check repo name)":""));
  const data=await res.json();
  const content=decodeURIComponent(escape(atob(data.content.replace(/\n/g,""))));
  return {sha:data.sha, json:JSON.parse(content)};
}
async function ghSave(jsonText, sha){
  const tok=$("#token").value.trim();
  function attempt(useSha){
    const body={ message:"Update scores", content:btoa(unescape(encodeURIComponent(jsonText))), branch:"main" };
    if(useSha) body.sha=useSha;
    return fetch(ghBase(),{method:"PUT",
      headers:{Authorization:"token "+tok,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify(body)});
  }
  let res=await attempt(sha);
  // 409 = sha conflict: re-fetch the true current sha and retry once
  if(res.status===409){
    const fresh=await ghLoad();
    res=await attempt(fresh.sha);
  }
  if(!res.ok){ const t=await res.text(); throw new Error("Save failed: HTTP "+res.status+" "+t.slice(0,120)); }
  return res.json();
}

let currentSha=null;

function applyJsonToState(json){
  for(const k in state) delete state[k];
  if(json && Array.isArray(json.matches)){
    for(const m of json.matches){
      const k=key(m.group,m.home,m.away);
      state[k]={ hs:(m.hs==null?null:m.hs), as:(m.as==null?null:m.as), status:m.status||"finished" };
    }
  }
}

function render(){
  const groups={};
  for(const f of ALLFIX){ (groups[f[0]]=groups[f[0]]||[]).push(f); }
  let html="";
  for(const g of Object.keys(groups).sort()){
    const done=groups[g].filter(f=>{const s=state[key(f[0],f[1],f[2])];return s&&s.status==="finished";}).length;
    html+=`<details class="g" ${g==="C"?"open":""}><summary><span class="tag">${g}</span>Group ${g}<span class="cnt">${done}/6 done</span><span class="chev">\u25b8</span></summary><div class="body">`;
    for(const f of groups[g]){
      const k=key(f[0],f[1],f[2]); const st=state[k]||{};
      html+=`<div class="m" data-k="${k}">
        <div class="h">${TEAMS[f[1]].n} ${flag(f[1])}</div>
        <div class="sc">
          <input type="number" min="0" max="30" inputmode="numeric" data-side="hs" value="${st.hs!=null?st.hs:""}">
          <span class="dash">\u2013</span>
          <input type="number" min="0" max="30" inputmode="numeric" data-side="as" value="${st.as!=null?st.as:""}">
          <span class="stbtns">
            <button data-st="finished" class="${st.status==="finished"?"on":""}">FT</button>
            <button data-st="live" class="${st.status==="live"?"onlive":""}">LIVE</button>
          </span>
        </div>
        <div class="a">${flag(f[2])} ${TEAMS[f[2]].n}</div>
      </div>`;
    }
    html+=`</div></details>`;
  }
  $("#groups").innerHTML=html;
  bind();
}

function bind(){
  document.querySelectorAll(".m").forEach(row=>{
    const k=row.dataset.k;
    row.querySelectorAll("input").forEach(inp=>{
      inp.addEventListener("input",()=>{
        const hs=row.querySelector('[data-side="hs"]').value;
        const as=row.querySelector('[data-side="as"]').value;
        state[k]=state[k]||{};
        state[k].hs = hs===""?null:Math.max(0,parseInt(hs)||0);
        state[k].as = as===""?null:Math.max(0,parseInt(as)||0);
        if(state[k].hs!=null && state[k].as!=null && !state[k].status) state[k].status="finished";
        if(state[k].hs==null && state[k].as==null) delete state[k];
        refreshButtons(row,k);
      });
    });
    row.querySelectorAll("[data-st]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        state[k]=state[k]||{};
        const want=btn.dataset.st;
        state[k].status=(state[k].status===want)?null:want;
        refreshButtons(row,k);
      });
    });
  });
}
function refreshButtons(row,k){
  const st=state[k]||{};
  row.querySelector('[data-st="finished"]').className = st.status==="finished"?"on":"";
  row.querySelector('[data-st="live"]').className = st.status==="live"?"onlive":"";
  const g=k.split("|")[0];
  document.querySelectorAll("details.g").forEach(d=>{
    if(d.querySelector(".tag").textContent===g){
      const done=ALLFIX.filter(f=>f[0]===g && state[key(f[0],f[1],f[2])] && state[key(f[0],f[1],f[2])].status==="finished").length;
      d.querySelector(".cnt").textContent=done+"/6 done";
    }
  });
}

function buildJson(){
  const matches=[];
  for(const f of ALLFIX){
    const k=key(f[0],f[1],f[2]); const st=state[k];
    if(!st || (st.hs==null && st.as==null)) continue;
    matches.push({group:f[0],home:f[1],away:f[2],
      hs:st.hs!=null?st.hs:null, as:st.as!=null?st.as:null,
      status:(st.hs!=null&&st.as!=null)?(st.status||"finished"):"scheduled"});
  }
  return JSON.stringify({updated:new Date().toISOString(),matches},null,2);
}

function setStatus(msg,cls){ const s=$("#status"); s.textContent=msg; s.className="status "+(cls||""); }

async function reload(){
  if(!$("#owner").value.trim()||!$("#repo").value.trim()||!$("#token").value.trim()){
    setStatus("Enter username, repo and token first.","err"); return;
  }
  setStatus("Loading current scores from GitHub...","busy");
  try{
    const r=await ghLoad();
    currentSha=r.sha;
    applyJsonToState(r.json);
    render();
    const n=r.json&&r.json.matches?r.json.matches.length:0;
    setStatus("Loaded "+n+" saved games. Add more, then Save.","ok");
  }catch(e){ setStatus(e.message,"err"); }
}

async function save(){
  if(!$("#owner").value.trim()||!$("#repo").value.trim()||!$("#token").value.trim()){
    setStatus("Enter username, repo and token first.","err"); return;
  }
  saveCreds();
  $("#saveBtn").disabled=true;
  setStatus("Saving to GitHub...","busy");
  try{
    let sha=currentSha;
    try{ const cur=await ghLoad(); sha=cur.sha; }catch(e){}
    const jsonText=buildJson();
    await ghSave(jsonText, sha);
    try{ const after=await ghLoad(); currentSha=after.sha; }catch(e){}
    const count=JSON.parse(jsonText).matches.length;
    setStatus("\u2713 Saved "+count+" games. Tracker will update shortly.","ok");
  }catch(e){ setStatus(e.message,"err"); }
  $("#saveBtn").disabled=false;
}

$("#saveTok").addEventListener("click",()=>{ saveCreds(); reload(); });
$("#saveBtn").addEventListener("click",save);
$("#reloadBtn").addEventListener("click",reload);

loadCreds();
render();
if($("#token").value.trim() && $("#owner").value.trim() && $("#repo").value.trim()){
  reload();
} else {
  setStatus("Enter your GitHub details above to begin.","");
}
</script>
</body>
</html>
